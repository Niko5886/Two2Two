<div class="messages-container container-xl mt-4 mb-4">
  <div class="row g-0 h-100 rounded-4 border border-secondary shadow-lg overflow-hidden position-relative messages-layout messages-shell">
    
    <!-- Contacts Sidebar (Col 4) -->
    <div class="col-12 col-md-5 col-lg-4 d-flex flex-column border-end border-secondary bg-opacity-75 contacts-sidebar messages-sidebar" id="contactsSidebar">
      <!-- Search & Header -->
      <div class="p-3 border-bottom border-secondary bg-dark bg-opacity-50 messages-sidebar__top">
        <h5 class="mb-3 text-white fw-bold d-flex justify-content-between align-items-center">
          <span><i class="bi bi-chat-dots-fill text-primary me-2"></i>Съобщения</span>
          <!-- Mobile Close Button (shows only when chat open and back on mobile) - Wait, mobile behavior handled by classes -->
        </h5>
        <div class="input-group input-group-sm">
          <span class="input-group-text bg-transparent border-secondary text-muted"><i class="bi bi-search"></i></span>
          <input type="text" id="contactSearch" class="form-control bg-transparent border-secondary text-white" placeholder="Търси потребител...">
        </div>
      </div>
      
      <!-- Contact List -->
      <div class="contacts-list flex-grow-1 overflow-y-auto" id="conversationsList">
        <div class="text-center text-muted p-4 mt-4" id="convoLoading">
          <div class="spinner-border spinner-border-sm text-primary mb-2" role="status"></div>
          <p class="small">Зареждане на съобщения...</p>
        </div>
        <!-- Contacts injected here -->
      </div>
    </div>

    <!-- Active Chat Area (Col 8) -->
    <div class="col-12 col-md-7 col-lg-8 d-flex flex-column bg-gradient-dark position-relative chat-area messages-chat" id="chatArea">
      
      <!-- Empty State / No Chat Selected -->
      <div id="emptyChatState" class="h-100 d-flex flex-column align-items-center justify-content-center text-muted p-4 w-100 position-absolute top-0 start-0 bg-dark z-2">
        <div class="rounded-circle bg-secondary bg-opacity-25 p-4 mb-3 d-flex align-items-center justify-content-center empty-chat-icon-wrap">
          <i class="bi bi-chat-square-heart text-secondary fs-1"></i>
        </div>
        <h4>Вашите съобщения</h4>
        <p class="text-center small">Изберете чат от списъка вляво, за да започнете комуникация.</p>
      </div>

      <!-- Chat Header -->
      <div id="chatHeader" class="p-3 border-bottom border-secondary bg-dark bg-opacity-50 d-flex align-items-center justify-content-between d-none chat-header-min-height">
        <div class="d-flex align-items-center">
          <button class="btn btn-sm btn-link text-white-50 p-0 me-3 d-md-none d-block" id="backToContactsBtn" title="Назад към контактите" aria-label="Назад към контактите">
            <i class="bi bi-chevron-left fs-5"></i>
          </button>
          <img src="" id="chatAvatar" class="rounded-circle border border-primary me-3 object-fit-cover chat-avatar" alt="Avatar">
          <div class="flex-grow-1 lh-sm cursor-pointer" id="chatProfileLink" title="Виж профила">
            <h6 class="mb-0 text-white fw-bold" id="chatUsername">...</h6>
            <small class="text-white-50" id="chatStatus">...</small>
          </div>
        </div>
        <div>
          <!-- Options menu could go here -->
          <button class="btn btn-link text-muted" title="Още опции" aria-label="Още опции"><i class="bi bi-three-dots-vertical"></i></button>
        </div>
      </div>

      <!-- Messages Flow -->
      <div id="messagesFlow" class="flex-grow-1 overflow-y-auto p-3 d-none position-relative messages-flow-bg">
        <!-- Messages injected here -->
      </div>

      <!-- Chat Input Area -->
      <div id="chatInputArea" class="p-3 bg-dark border-top border-secondary d-none">
        <form id="sendMessageForm" class="d-flex align-items-end gap-2">
          <textarea id="messageInput" class="form-control bg-transparent border-secondary text-white custom-scrollbar resizable-none message-input" rows="1" placeholder="Напиши съобщение..."></textarea>
          <button type="submit" class="btn btn-primary rounded-circle d-flex align-items-center justify-content-center flex-shrink-0 send-btn" title="Изпрати съобщение" aria-label="Изпрати съобщение">
            <i class="bi bi-send-fill ms-1 mt-1"></i>
          </button>
        </form>
      </div>
    </div>

  </div>
</div>
