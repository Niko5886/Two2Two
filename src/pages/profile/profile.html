<section class="public-profile-page">
  <div class="public-profile-shell">
    <header class="public-profile-hero" data-hero>
      <div class="public-profile-hero__cover" data-cover></div>
      <div class="public-profile-hero__content">
        <div class="public-profile-avatar" data-avatar></div>
        <div class="public-profile-headline">
          <p class="public-profile-status" data-status>Зареждане...</p>
          <h1 data-name>Профил</h1>
          <p class="public-profile-meta" data-meta>—</p>
        </div>
      </div>
    </header>

    <div class="public-profile-layout">
      <aside class="public-profile-aside">
        <section class="public-profile-card">
          <h2>Партньори</h2>
          <div class="public-profile-partners" data-partners></div>
          <input type="file" data-partner-photo-input accept="image/*" hidden />
        </section>
      </aside>

      <main class="public-profile-main">
        <section class="public-profile-card">
          <h2>За нас</h2>
          <div class="public-profile-about editable-text-wrapper" data-about-wrapper>
            <p class="public-profile-about-text" data-about></p>
          </div>
        </section>

        <section class="public-profile-card" data-actions-section>
          <h2>Действия</h2>
          <div class="public-profile-actions">
            <button type="button" class="profile-action-btn btn btn-outline-primary btn-sm" data-action="message"><i class="bi bi-chat-left-text me-1"></i>Съобщение</button>
            <button type="button" class="profile-action-btn btn btn-outline-info btn-sm" data-action="friend"><i class="bi bi-person-plus me-1"></i>Добави приятел</button>
            <button type="button" class="profile-action-btn btn btn-outline-danger btn-sm" data-action="like"><i class="bi bi-heart me-1"></i>Харесай профила</button>
          </div>
        </section>

        <!-- Ignoring editing for tags via inline for now or implementing basic text-based edit -->
        <section class="public-profile-card">
          <h2>Какво търси</h2>
          <div class="public-profile-tags editable-field" data-looking-for data-field="looking_for" data-type="array"></div>
        </section>

        <section class="public-profile-card">
          <h2>Фетиши и интереси</h2>
          <div class="public-profile-tags editable-field" data-fetishes data-field="fetishes" data-type="array"></div>
        </section>

        <section class="public-profile-card">
          <div class="card-header-flex">
            <h2>Снимки</h2>
            <button class="add-btn btn btn-primary btn-sm" data-add-photo hidden title="Добави снимка"><i class="bi bi-plus-lg"></i></button>
            <input type="file" data-photo-input accept="image/*" hidden />
          </div>
          <div class="public-profile-gallery" data-gallery></div>
        </section>
      </main>
    </div>
  </div>
</section>
